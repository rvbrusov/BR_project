name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Detect latest build spec
        id: detect
        shell: pwsh
        run: |
          $spec = Get-ChildItem -File "fixed*_portable_upx_onefile.spec" |
            Sort-Object Name |
            Select-Object -Last 1
          if (-not $spec) { throw "No fixed*_portable_upx_onefile.spec found" }
          $name = [System.IO.Path]::GetFileNameWithoutExtension($spec.Name)
          "spec=$($spec.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "exe_name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Spec: $($spec.Name)"
          Write-Host "EXE name: $name"

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm "${{ steps.detect.outputs.spec }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.detect.outputs.exe_name }}
          path: dist/${{ steps.detect.outputs.exe_name }}.exe
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.detect.outputs.exe_name }}.exe
          generate_release_notes: true
