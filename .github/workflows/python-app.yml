# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # Lint only the latest app version file to avoid archived snapshots/noise.
        TARGET_FILE="$(ls -1 fixed*_app_*_portable_build.py | sort -V | tail -n 1)"
        echo "Lint target: ${TARGET_FILE}"
        # stop the build if there are Python syntax errors or undefined names
        flake8 "${TARGET_FILE}" --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 "${TARGET_FILE}" --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        if compgen -G "tests/*.py" > /dev/null || compgen -G "test_*.py" > /dev/null || compgen -G "*_test.py" > /dev/null; then
          pytest -q
        else
          echo "No tests found, skipping pytest."
        fi
